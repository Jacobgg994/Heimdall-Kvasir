appId: us.contentsdigital.phone-bot
productName: Phone Bot
copyright: "Copyright © 2026 Contents Digital"

directories:
  output: release
  buildResources: resources

linux:
  target:
    - target: deb
      arch: [x64]
    - target: AppImage
      arch: [x64]
  category: Utility
  icon: resources/icon.png
  maintainer: jacob@contentsdigital.us

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

files:
  - dist/**/*
  - dist-electron/**/*
  - server/**/*
  - resources/**/*

extraResources:
  - from: server
    to: server
    filter:
      - "**/*"
